version: '3.9'

# Local development stack.
# Run: pnpm db:up
# Stop: pnpm db:down

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: beyond_borders
      POSTGRES_USER: bb
      POSTGRES_PASSWORD: bb_local
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bb -d beyond_borders']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # S3-compatible object storage for documents and branding assets.
  # Console UI: http://localhost:9001 (user: bb_local, pass: bb_local_secret)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: bb_local
      MINIO_ROOT_PASSWORD: bb_local_secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
